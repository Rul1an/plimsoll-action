name: Public Artifact Sanitization

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "47 4 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  public-artifact-sanitization:
    name: Public Artifact Sanitization
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Self-test sanitizer
        run: python3 scripts/check_public_artifact_sanitization.py --self-test

      - name: Scan tracked public artifacts
        run: python3 scripts/check_public_artifact_sanitization.py

      - name: Trusted private-list HMAC scan
        env:
          PUBLIC_ARTIFACT_DENYLIST_HMAC_SHA256: ${{ secrets.PUBLIC_ARTIFACT_DENYLIST_HMAC_SHA256 }}
          PUBLIC_ARTIFACT_DENYLIST_HMAC_KEY: ${{ secrets.PUBLIC_ARTIFACT_DENYLIST_HMAC_KEY }}
        run: >
          python3 scripts/check_public_artifact_sanitization.py
          --trusted-hmac-env PUBLIC_ARTIFACT_DENYLIST_HMAC_SHA256
          --trusted-hmac-key-env PUBLIC_ARTIFACT_DENYLIST_HMAC_KEY
          --trusted-hmac-canary-file .github/sanitizer/trusted-hmac-canary.txt
