name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --quiet --upgrade pip build mypy ruff
          python -m pip install --quiet .

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Types
        run: mypy

      - name: Test
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Action smoke (self-test the bundled CLI)
        run: |
          set -euo pipefail
          mkdir -p /tmp/s
          cat > /tmp/s/a.json <<'JSON'
          {"schema":"assay.runner.capability_surface.v0","filesystem_paths":["/workspace/x"],"network_endpoints":[],"process_execs":[],"mcp_tools":["t"],"observation_health":{"kernel_layer":"complete","network_protocol_coverage":"connect_only"}}
          JSON
          cat > /tmp/s/b.json <<'JSON'
          {"schema":"assay.runner.capability_surface.v0","filesystem_paths":["/workspace/x"],"network_endpoints":["evil.example:443"],"process_execs":[],"mcp_tools":["t"],"observation_health":{"kernel_layer":"complete","network_protocol_coverage":"connect_only"}}
          JSON
          plimsoll diff --before /tmp/s/a.json --after /tmp/s/b.json --workspace /workspace --out-dir /tmp/s/out
          plimsoll sarif --review /tmp/s/out/review.json --out /tmp/s/out/plimsoll.sarif
          python -c "import json; r=json.load(open('/tmp/s/out/review.json')); assert r['decision']=='pending', r['decision']; assert len(r['findings_requiring_approval'])>=1; print('smoke ok:', r['decision'])"

      - name: Package smoke
        run: |
          set -euo pipefail
          python -m build --wheel --sdist
          python -m venv /tmp/plimsoll-action-wheel
          /tmp/plimsoll-action-wheel/bin/pip install dist/*.whl
          /tmp/plimsoll-action-wheel/bin/plimsoll --help
          test -n "$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"

      - name: Tracked bytecode hygiene
        run: |
          set -euo pipefail
          tracked="$(git ls-files '*__pycache__*' '*.pyc' '*.pyo' || true)"
          if [ -n "$tracked" ]; then
            echo "::error::Generated Python bytecode must not be tracked."
            printf '%s\n' "$tracked"
            exit 1
          fi
